# Build Electrobun bundles on Windows + Linux and attach them to a GitHub Release.
# Triggers: git tag v* (e.g. v0.2.0), or manual run (artifacts only, no release unless tag).

name: Build & release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  bundle:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            artifact: windows-x64
          - os: ubuntu-22.04
            artifact: linux-x64
          - os: macos-15-intel
            artifact: macos-x86
          - os: macos-15
            artifact: macos-arm64

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Linux — GTK / WebKit (Electrobun)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential cmake pkg-config \
            libgtk-3-dev libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev librsvg2-dev

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Bundle desktop app (Electrobun)
        run: bun run build:stable

      - name: List artifacts
        shell: bash
        run: |
          ls -la artifacts/ || true
          ls -la build/ || true

      - name: Upload bundle
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: artifacts/
          if-no-files-found: error

  release:
    needs: bundle
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest

    steps:
      - name: Download Windows bundle
        uses: actions/download-artifact@v4
        with:
          name: windows-x64
          path: release-assets/windows-x64

      - name: Download Linux bundle
        uses: actions/download-artifact@v4
        with:
          name: linux-x64
          path: release-assets/linux-x64

      - name: Download macOS x86 bundle
        uses: actions/download-artifact@v4
        with:
          name: macos-x86
          path: release-assets/macos-x86

      - name: Download macOS arm64 bundle
        uses: actions/download-artifact@v4
        with:
          name: macos-arm64
          path: release-assets/macos-arm64

      - name: Flatten for GitHub Release
        run: |
          mkdir -p upload
          find release-assets -type f -exec cp -v {} upload/ \;
          ls -la upload/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          generate_release_notes: false
          files: upload/*
          body_path: CHANGELOG.md
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
